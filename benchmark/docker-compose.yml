# Local memory-store backends for The Forgetting Report benchmark.
#
#   docker compose up -d        # start pgvector, qdrant, chroma
#   docker compose ps           # check health
#   docker compose down -v      # stop and wipe volumes
#
# Mem0 runs in-process (no service here). Zep and AWS AgentCore are set up
# separately (see README). Pin exact image digests before the public launch.

services:
  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ferryte
      POSTGRES_PASSWORD: ferryte
      POSTGRES_DB: ferryte
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferryte"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chromadata:/data

volumes:
  pgdata:
  qdrantdata:
  chromadata:
